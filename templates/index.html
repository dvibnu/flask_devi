<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Diabetes Prediction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { 
        font-family: Arial, sans-serif; 
        max-width: 760px; 
        margin: 24px auto; 
        padding: 20px; 
        background-color: #FFE5B4; /* Ini warna latar orange pastelnya */
    }
    h1 {
        text-align: center;
        color: #d35400; /* Warna orange tua untuk judul biar kontras */
    }
    form { 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 15px; 
        margin-top: 16px; 
        background-color: white; /* Kotak formulir warna putih */
        padding: 24px;
        border-radius: 12px; /* Ujungnya dibuat melengkung */
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Efek bayangan tipis */
    }
    label { 
        display: block; 
        font-size: 14px; 
        margin-bottom: 5px; 
        font-weight: bold; 
        color: #555;
    }
    input, select { 
        width: 100%; 
        padding: 10px; 
        box-sizing: border-box; 
        border: 1px solid #ccc; 
        border-radius: 6px; 
    }
    .full { grid-column: 1 / -1; }
    .submit { 
        grid-column: 1 / -1; 
        text-align: center; 
        margin-top: 15px; 
    }
    button {
        background-color: #FF8C00; /* Warna tombol orange */
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
    }
    button:hover {
        background-color: #E67E22; /* Warna tombol sedikit gelap saat disentuh mouse */
    }
    .result { 
        margin-top: 16px; 
        font-size: 18px;
        font-weight: bold; 
        text-align: center;
        background-color: white;
        padding: 16px;
        border-radius: 8px;
        color: #d35400;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h1>Diabetes Prediction</h1>

  {% if prediction %}
    <div class="result">Hasil prediksi: {{ prediction }}</div>
  {% endif %}

  <form method="post" action="/predict">
    <div class="full">
      <label for="model">Model</label>
      <select name="model" id="model" class="form-control">
            <option value="SVC">SVC</option>
            <option value="Decision Tree">Decision Tree</option>
        </select>
    </div>

    <div><label>Pregnancies</label><input type="number" name="pregnancies" required></div>
    <div><label>Glucose</label><input type="number" name="glucose" required></div>
    <div><label>BloodPressure</label><input type="number" name="blood_pressure" required></div>
    <div><label>SkinThickness</label><input type="number" name="skin_thickness" required></div>
    <div><label>Insulin</label><input type="number" name="insulin" required></div>
    <div><label>BMI</label><input type="number" step="0.1" name="bmi" required></div>
    <div><label>DiabetesPedigreeFunction</label><input type="number" step="0.001" name="diabetes_pedigree" required></div>
    <div><label>Age</label><input type="number" name="age" required></div>

    <div class="submit"><button type="submit">Predict</button></div>
  </form>
</body>
</html>
